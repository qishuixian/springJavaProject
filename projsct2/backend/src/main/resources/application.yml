server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bookdb?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 5MB        # 单个文件最大 5MB
      max-request-size: 10MB    # 单次请求最大 10MB

# 自定义文件上传路径配置
file:
  upload-dir: D:/uploads/covers/   # 上传文件保存的本地目录
  access-path: /uploads/covers/**  # 对外访问的 URL 前缀
# JWT 配置
jwt:
  secret: mySecretKeyForJWTTokenGeneration2026VeryLongString   # 签名密钥，越长越安全。就像会员卡的防伪水印
  expiration: 86400000  # 24小时（毫秒） 	Token 的有效期，单位毫秒。86400000 毫秒 = 24 小时