server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bookdb?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
# JWT 配置
jwt:
  secret: mySecretKeyForJWTTokenGeneration2026VeryLongString   # 签名密钥，越长越安全。就像会员卡的防伪水印
  expiration: 86400000  # 24小时（毫秒） 	Token 的有效期，单位毫秒。86400000 毫秒 = 24 小时